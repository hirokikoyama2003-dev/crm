<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>ログイン - 顧客管理CRM</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
  <style>
    body {
      background: #1a2340;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .login-card {
      background: #fff;
      border-radius: 16px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.3);
      padding: 2.5rem 2rem;
      width: 100%;
      max-width: 380px;
    }
    .brand {
      color: #1a2340;
      font-size: 1.3rem;
      font-weight: 700;
      text-align: center;
      margin-bottom: 0.3rem;
    }
    .brand-sub {
      color: #6c757d;
      font-size: 0.85rem;
      text-align: center;
      margin-bottom: 2rem;
    }
    .form-label { font-size: 0.88rem; font-weight: 600; color: #444; }
    .btn-login {
      background: #1a2340;
      color: #fff;
      border: none;
      width: 100%;
      padding: 0.65rem;
      border-radius: 8px;
      font-size: 0.95rem;
      font-weight: 600;
      margin-top: 0.5rem;
      transition: background 0.15s;
    }
    .btn-login:hover { background: #2e3d5e; color: #fff; }
  </style>
</head>
<body>
  <div class="login-card">
    <div class="brand"><i class="bi bi-people-fill me-2"></i>顧客管理CRM</div>
    <div class="brand-sub">不動産営業 追客システム</div>

    {% if error %}
    <div class="alert alert-danger py-2 px-3 mb-3" style="font-size:0.88rem;">
      <i class="bi bi-exclamation-circle me-1"></i>{{ error }}
    </div>
    {% endif %}

    <form method="post" action="/login">
      <div class="mb-3">
        <label class="form-label">ログインID</label>
        <input type="text" name="username" class="form-control" placeholder="IDを入力" autofocus required>
      </div>
      <div class="mb-3">
        <label class="form-label">パスワード</label>
        <input type="password" name="password" class="form-control" placeholder="パスワードを入力" required>
      </div>
      <button type="submit" class="btn-login">
        <i class="bi bi-box-arrow-in-right me-1"></i>ログイン
      </button>
    </form>
  </div>
</body>
</html>
