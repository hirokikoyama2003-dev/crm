<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}顧客管理システム{% endblock %}</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
  <style>
    body { background: #f4f6fa; }
    .sidebar {
      min-height: 100vh;
      background: #1a2340;
      width: 220px;
      position: fixed;
      top: 0; left: 0;
      z-index: 100;
      display: flex;
      flex-direction: column;
    }
    .sidebar .brand {
      padding: 1.5rem 1.2rem 1rem;
      color: #fff;
      font-size: 1.1rem;
      font-weight: 700;
      letter-spacing: 0.02em;
      border-bottom: 1px solid #2e3d5e;
    }
    .sidebar .nav-link {
      color: #adb5c9;
      padding: 0.65rem 1.2rem;
      display: flex;
      align-items: center;
      gap: 0.6rem;
      font-size: 0.92rem;
      border-radius: 0;
      transition: background 0.15s, color 0.15s;
    }
    .sidebar .nav-link:hover, .sidebar .nav-link.active {
      background: #2e3d5e;
      color: #fff;
    }
    .sidebar .nav-section {
      color: #5a6a8a;
      font-size: 0.72rem;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      padding: 1rem 1.2rem 0.3rem;
    }
    .main-content {
      margin-left: 220px;
      padding: 2rem;
      min-height: 100vh;
    }
    .topbar {
      background: #fff;
      border-bottom: 1px solid #e2e8f0;
      padding: 0.75rem 2rem;
      margin-left: 220px;
      position: sticky;
      top: 0;
      z-index: 99;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .rank-badge { font-size: 0.8rem; font-weight: 700; padding: 0.3em 0.7em; border-radius: 4px; }
    .card { border: none; box-shadow: 0 1px 4px rgba(0,0,0,0.07); border-radius: 10px; }
    .table th { font-size: 0.82rem; color: #6c757d; font-weight: 600; border-top: none; }
    .overdue-row { background: #fff5f5 !important; }
    .today-row { background: #fffbeb !important; }
  </style>
  {% block head %}{% endblock %}
</head>
<body>

<div class="sidebar">
  <div class="brand"><i class="bi bi-people-fill me-2"></i>顧客管理CRM</div>
  <nav class="mt-2">
    <div class="nav-section">メイン</div>
    <a href="/" class="nav-link {% if request.url.path == '/' %}active{% endif %}">
      <i class="bi bi-speedometer2"></i> ダッシュボード
    </a>
    <a href="/customers/" class="nav-link {% if '/customers' in request.url.path %}active{% endif %}">
      <i class="bi bi-person-lines-fill"></i> 顧客一覧
    </a>
    <a href="/customers/new" class="nav-link">
      <i class="bi bi-person-plus-fill"></i> 顧客追加
    </a>
    <a href="/report" class="nav-link {% if '/report' in request.url.path %}active{% endif %}">
      <i class="bi bi-graph-up-arrow"></i> 進捗レポート
    </a>
    <div class="nav-section">設定</div>
    <a href="/settings/ranks" class="nav-link {% if '/settings/ranks' in request.url.path %}active{% endif %}">
      <i class="bi bi-bar-chart-fill"></i> ランク設定
    </a>
    <a href="/settings/lifecycle" class="nav-link {% if '/settings/lifecycle' in request.url.path %}active{% endif %}">
      <i class="bi bi-arrow-repeat"></i> ライフサイクル
    </a>
    <a href="/settings/templates" class="nav-link {% if '/settings/templates' in request.url.path %}active{% endif %}">
      <i class="bi bi-envelope-paper-fill"></i> メールテンプレート
    </a>
  </nav>
</div>

<div class="topbar">
  <span class="fw-semibold text-secondary" style="font-size:0.92rem;">{% block page_title %}{% endblock %}</span>
  <div></div>
</div>

<div class="main-content">
  {% block content %}{% endblock %}
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="/static/app.js"></script>
{% block scripts %}{% endblock %}
</body>
</html>
